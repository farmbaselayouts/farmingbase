<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FWCB - Admin Panel</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { background-color: #f4f7f6; color: #333; }
        
        .admin-nav { background: #1e293b; color: #fff; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        #logout-btn { background: #ef4444; padding: 8px 16px; border: none; border-radius: 6px; color: white; cursor: pointer; font-weight: 600; transition: 0.3s;}
        #logout-btn:hover { background: #dc2626; }

        .dashboard-container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        .card { background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 25px; }
        .section-title { border-bottom: 2px solid #f1f5f9; padding-bottom: 10px; margin-bottom: 20px; color: #0f172a; }
        
        .tabs { display: flex; gap: 10px; margin-bottom: 25px; }
        .tab-btn { padding: 12px 25px; border: none; background: #e2e8f0; border-radius: 8px; cursor: pointer; font-weight: 600; color: #475569; transition: 0.3s;}
        .tab-btn.active { background: #3b82f6; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: flex; flex-wrap: wrap; gap: 20px; }

        .form-group { margin-bottom: 15px; width: 100%; }
        input, select, textarea { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #cbd5e1; background: #f8fafc; font-family: 'Poppins', sans-serif; }
        input:focus, select:focus, textarea:focus { border-color: #3b82f6; outline: none; background: #fff; }
        
        .btn-primary { width: 100%; padding: 14px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; color: white; text-transform: uppercase; margin-top: 10px; transition: 0.3s; }
        .btn-gray { background: #94a3b8; display: none; } .btn-gray:hover { background: #64748b; }
        
        .list-item { border: 1px solid #e2e8f0; padding: 15px; border-radius: 8px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; background: #fff;}
        .list-item:hover { border-color: #cbd5e1; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .action-btns button { padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: 600; color: white; margin-left: 5px; transition: 0.2s;}
        .btn-edit { background: #f59e0b; } .btn-edit:hover { background: #d97706; }
        .btn-delete { background: #ef4444; } .btn-delete:hover { background: #dc2626; }
    </style>
</head>
<body>

    <div id="login-section" style="max-width: 400px; margin: 100px auto;" class="card">
        <h2 style="text-align: center; margin-bottom: 20px;" class="section-title">Admin Login</h2>
        <input type="email" id="email" placeholder="Email Address" class="form-group">
        <input type="password" id="password" placeholder="Password" class="form-group">
        <button id="login-btn" class="btn-primary" style="background: #3b82f6;">Secure Login</button>
        <p id="login-error" style="color: #ef4444; text-align: center; margin-top: 10px; font-weight: 500;"></p>
    </div>

    <div id="admin-section" style="display: none;">
        <nav class="admin-nav">
            <h1>FWCB Admin Panel</h1>
            <button id="logout-btn">Log Out</button>
        </nav>

        <div class="dashboard-container">
            <div class="tabs">
                <button class="tab-btn active" id="tab-btn-bases">Manage Bases</button>
                <button class="tab-btn" id="tab-btn-rules">Manage Rules</button>
            </div>

            <div id="content-bases" class="tab-content active">
                <div class="card" style="flex: 1; min-width: 300px;">
                    <h3 id="base-form-title" class="section-title">Add New Base</h3>
                    <input type="hidden" id="edit-base-id">
                    
                    <select id="base-th" class="form-group">
                        <option value="" disabled selected>Select Town Hall</option>
                        <option value="8">TH 8</option><option value="9">TH 9</option>
                        <option value="10">TH 10</option><option value="11">TH 11</option>
                        <option value="12">TH 12</option><option value="13">TH 13</option>
                        <option value="14">TH 14</option><option value="15">TH 15</option>
                        <option value="16">TH 16</option><option value="17">TH 17</option>
                        <option value="18">TH 18</option>
                    </select>
                    <input type="text" id="base-title" placeholder="Base Title (e.g. Best Farming TH14)" class="form-group">
                    <input type="url" id="base-img" placeholder="Image URL (Postimages Direct Link)" class="form-group">
                    <input type="url" id="base-link" placeholder="In-Game Copy Link" class="form-group">
                    
                    <button id="save-base-btn" class="btn-primary" style="background: #10b981;">Save Base</button>
                    <button id="cancel-base-btn" class="btn-primary btn-gray">Cancel Edit</button>
                    <p id="base-msg" style="color: #10b981; font-weight: 600; text-align: center; margin-top: 10px;"></p>
                </div>
                <div class="card" style="flex: 1.5; min-width: 350px;">
                    <h3 class="section-title">Active Bases List (<span id="base-count">0</span>)</h3>
                    <div id="bases-admin-list"><p style="text-align: center; color: #888;">Loading bases...</p></div>
                </div>
            </div>

            <div id="content-rules" class="tab-content">
                <div class="card" style="flex: 1; min-width: 300px;">
                    <h3 id="rule-form-title" class="section-title">Add Rule Section</h3>
                    <input type="hidden" id="edit-rule-id">
                    
                    <input type="text" id="rule-title" placeholder="Section Title (e.g. War Rules)" class="form-group">
                    <textarea id="rule-points" placeholder="Rule Points (Enter for new point)" style="height: 120px;" class="form-group"></textarea>
                    <textarea id="rule-images" placeholder="Image URLs (Enter for new image)" style="height: 80px;" class="form-group"></textarea>
                    
                    <button id="save-rule-btn" class="btn-primary" style="background: #3b82f6;">Save Rule Section</button>
                    <button id="cancel-rule-btn" class="btn-primary btn-gray">Cancel Edit</button>
                    <p id="rule-msg" style="color: #3b82f6; font-weight: 600; text-align: center; margin-top: 10px;"></p>
                </div>
                <div class="card" style="flex: 1.5; min-width: 350px;">
                    <h3 class="section-title">Rule Sections List</h3>
                    <div id="rules-admin-list"><p style="text-align: center; color: #888;">Loading rules...</p></div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
      import { getFirestore, collection, addDoc, getDocs, doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
      import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

      const firebaseConfig = {
        apiKey: "AIzaSyC4hVhFlEBrdW7hF2EdLLTp6RiEaN-xxIA",
        authDomain: "lazy-cwl-directory.firebaseapp.com",
        projectId: "lazy-cwl-directory",
        storageBucket: "lazy-cwl-directory.firebasestorage.app",
        messagingSenderId: "587882023145",
        appId: "1:587882023145:web:ee8ac1f673e7b0e3e98878"
      };

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);
      const auth = getAuth(app);
      
      let allBases = {};
      let allRules = {};

      // Authentication
      onAuthStateChanged(auth, (user) => {
          document.getElementById('login-section').style.display = user ? 'none' : 'block';
          document.getElementById('admin-section').style.display = user ? 'block' : 'none';
          if(user) { fetchBases(); fetchRules(); }
      });

      document.getElementById('login-btn').onclick = () => {
          signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value).catch(e => document.getElementById('login-error').innerText = "Invalid Credentials!");
      };
      document.getElementById('logout-btn').onclick = () => signOut(auth);

      // Tabs Logic
      document.getElementById('tab-btn-bases').onclick = (e) => switchTab('bases', e.target);
      document.getElementById('tab-btn-rules').onclick = (e) => switchTab('rules', e.target);
      function switchTab(type, btn) {
          document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
          document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
          btn.classList.add('active');
          document.getElementById('content-' + type).classList.add('active');
      }

      // ==========================================
      // BASES CRUD LOGIC
      // ==========================================
      async function fetchBases() {
          const snap = await getDocs(collection(db, "farming_bases"));
          const list = document.getElementById('bases-admin-list');
          list.innerHTML = '';
          allBases = {};
          let count = 0;
          snap.forEach(d => {
              const b = d.data();
              allBases[d.id] = b;
              count++;
              const div = document.createElement('div');
              div.className = 'list-item';
              div.innerHTML = `
                  <div><b>TH ${b.th}:</b> ${b.title}</div>
                  <div class="action-btns">
                      <button class="btn-edit" onclick="editBase('${d.id}')">Edit</button>
                      <button class="btn-delete" onclick="deleteBase('${d.id}')">Delete</button>
                  </div>`;
              list.appendChild(div);
          });
          document.getElementById('base-count').innerText = count;
          if(count === 0) list.innerHTML = '<p style="text-align: center; color: #888;">No bases found.</p>';
      }

      window.editBase = (id) => {
          const b = allBases[id];
          document.getElementById('edit-base-id').value = id;
          document.getElementById('base-th').value = b.th;
          document.getElementById('base-title').value = b.title;
          document.getElementById('base-img').value = b.imgUrl;
          document.getElementById('base-link').value = b.link;
          
          document.getElementById('base-form-title').innerText = "Edit Base Info";
          document.getElementById('save-base-btn').innerText = "Update Base";
          document.getElementById('cancel-base-btn').style.display = "block";
          window.scrollTo({ top: 0, behavior: 'smooth' });
      };

      window.deleteBase = async (id) => { 
          if(confirm("Are you sure you want to delete this base?")) { 
              await deleteDoc(doc(db, "farming_bases", id)); 
              fetchBases(); 
          } 
      };

      document.getElementById('save-base-btn').onclick = async () => {
          const th = document.getElementById('base-th').value;
          const title = document.getElementById('base-title').value;
          const imgUrl = document.getElementById('base-img').value;
          const link = document.getElementById('base-link').value;
          const editId = document.getElementById('edit-base-id').value;

          if(!th || !title || !link) return alert("TH Level, Title, and Link are required!");

          const data = { th: parseInt(th), title, imgUrl, link };
          document.getElementById('save-base-btn').innerText = "Processing...";

          if(editId) {
              await updateDoc(doc(db, "farming_bases", editId), data);
              document.getElementById('base-msg').innerText = "Base Updated!";
          } else {
              await addDoc(collection(db, "farming_bases"), data);
              document.getElementById('base-msg').innerText = "Base Added!";
          }
          resetBaseForm();
          fetchBases();
      };

      function resetBaseForm() {
          document.getElementById('edit-base-id').value = '';
          document.getElementById('base-th').value = '';
          document.getElementById('base-title').value = '';
          document.getElementById('base-img').value = '';
          document.getElementById('base-link').value = '';
          document.getElementById('base-form-title').innerText = "Add New Base";
          document.getElementById('save-base-btn').innerText = "Save Base";
          document.getElementById('cancel-base-btn').style.display = "none";
          setTimeout(() => document.getElementById('base-msg').innerText = '', 3000);
      }
      document.getElementById('cancel-base-btn').onclick = resetBaseForm;


      // ==========================================
      // RULES SECTION CRUD LOGIC
      // ==========================================
      async function fetchRules() {
          const snap = await getDocs(collection(db, "rule_sections"));
          const list = document.getElementById('rules-admin-list');
          list.innerHTML = '';
          allRules = {};
          
          let sections = [];
          snap.forEach(d => sections.push({id: d.id, ...d.data()}));
          sections.sort((a, b) => a.timestamp - b.timestamp);

          if(sections.length === 0) {
              list.innerHTML = '<p style="text-align: center; color: #888;">No rules found.</p>';
              return;
          }

          sections.forEach(r => {
              allRules[r.id] = r;
              const pointCount = r.points ? r.points.length : 0;
              const div = document.createElement('div');
              div.className = 'list-item';
              div.innerHTML = `
                  <div>
                      <b>${r.title}</b><br>
                      <span style="font-size:12px; color:#64748b;">Points: ${pointCount}</span>
                  </div>
                  <div class="action-btns">
                      <button class="btn-edit" onclick="editRule('${r.id}')">Edit</button>
                      <button class="btn-delete" onclick="deleteRule('${r.id}')">Delete</button>
                  </div>`;
              list.appendChild(div);
          });
      }

      window.editRule = (id) => {
          const r = allRules[id];
          document.getElementById('edit-rule-id').value = id;
          document.getElementById('rule-title').value = r.title;
          document.getElementById('rule-points').value = r.points ? r.points.join('\n') : '';
          document.getElementById('rule-images').value = r.images ? r.images.join('\n') : '';
          
          document.getElementById('rule-form-title').innerText = "Edit Rule Section";
          document.getElementById('save-rule-btn').innerText = "Update Section";
          document.getElementById('cancel-rule-btn').style.display = "block";
          window.scrollTo({ top: 0, behavior: 'smooth' });
      };

      window.deleteRule = async (id) => { 
          if(confirm("Are you sure you want to delete this entire rule section?")) { 
              await deleteDoc(doc(db, "rule_sections", id)); 
              fetchRules(); 
          } 
      };

      document.getElementById('save-rule-btn').onclick = async () => {
          const title = document.getElementById('rule-title').value;
          const editId = document.getElementById('edit-rule-id').value;
          
          if(!title) return alert("Section title is required!");

          const points = document.getElementById('rule-points').value.split('\n').filter(p => p.trim() != '');
          const imgs = document.getElementById('rule-images').value.split('\n').filter(i => i.trim() != '');
          
          document.getElementById('save-rule-btn').innerText = "Processing...";

          if(editId) {
              await updateDoc(doc(db, "rule_sections", editId), { title, points, images });
              document.getElementById('rule-msg').innerText = "Section Updated!";
          } else {
              const data = { title, points, images, timestamp: Date.now() };
              await addDoc(collection(db, "rule_sections"), data);
              document.getElementById('rule-msg').innerText = "New Section Added!";
          }
          resetRuleForm();
          fetchRules();
      };

      function resetRuleForm() {
          document.getElementById('edit-rule-id').value = '';
          document.getElementById('rule-title').value = '';
          document.getElementById('rule-points').value = '';
          document.getElementById('rule-images').value = '';
          document.getElementById('rule-form-title').innerText = "Add Rule Section";
          document.getElementById('save-rule-btn').innerText = "Save Rule Section";
          document.getElementById('cancel-rule-btn').style.display = "none";
          setTimeout(() => document.getElementById('rule-msg').innerText = '', 3000);
      }
      document.getElementById('cancel-rule-btn').onclick = resetRuleForm;

    </script>
</body>
</html>
