<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farming Bases - Admin Panel</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');

        /* Global & Reset */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { background-color: #f0f2f5; color: #333; }
        
        /* Navbar */
        .admin-nav {
            background-color: #0f172a; color: #fff; padding: 15px 30px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 100;
        }
        .admin-nav h1 { font-size: 20px; font-weight: 600; letter-spacing: 1px; }
        #logout-btn { background: #ef4444; padding: 8px 16px; border: none; border-radius: 6px; color: #fff; cursor: pointer; font-weight: 600; transition: 0.3s; }
        #logout-btn:hover { background: #dc2626; }

        /* Dashboard Container */
        .dashboard-container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        .card { background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid #e2e8f0; margin-bottom: 25px; }
        .section-header { font-size: 18px; color: #0f172a; margin-bottom: 20px; border-bottom: 2px solid #f1f5f9; padding-bottom: 10px; font-weight: 600; }

        /* Tabs */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { padding: 12px 25px; border: none; background: #e2e8f0; color: #475569; font-weight: 600; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        .tab-btn.active { background: #3b82f6; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: flex; flex-wrap: wrap; gap: 25px; }

        /* Form Elements */
        .form-group { margin-bottom: 15px; }
        label.input-label { display: block; font-size: 13px; color: #64748b; font-weight: 500; margin-bottom: 5px; }
        input, select, textarea { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #cbd5e1; font-size: 14px; background: #f8fafc; transition: 0.3s; }
        input:focus, select:focus, textarea:focus { border-color: #3b82f6; outline: none; background: #fff; }
        textarea { resize: vertical; min-height: 120px; }

        /* Buttons */
        .btn-primary { width: 100%; padding: 14px; border: none; cursor: pointer; font-weight: 600; border-radius: 8px; text-transform: uppercase; color: white; transition: 0.3s; }
        .btn-success { background: #10b981; } .btn-success:hover { background: #059669; }
        .btn-blue { background: #3b82f6; } .btn-blue:hover { background: #2563eb; }
        .btn-gray { background: #94a3b8; display: none; margin-top: 10px; } .btn-gray:hover { background: #64748b; }

        /* List Items */
        .list-item { border: 1px solid #e2e8f0; padding: 15px; border-radius: 8px; margin-bottom: 12px; background: #fff; display: flex; justify-content: space-between; align-items: center; }
        .item-info { display: flex; align-items: center; gap: 15px; }
        .item-img { width: 60px; height: 60px; object-fit: cover; border-radius: 6px; border: 1px solid #ddd; background: #f1f5f9; }
        .item-details h4 { margin: 0 0 5px 0; color: #1e293b; font-size: 16px; }
        .item-details p { margin: 0; font-size: 13px; color: #64748b; }
        .action-btns { display: flex; gap: 8px; }
        .btn-edit { background: #f59e0b; color: white; padding: 6px 12px; border: none; border-radius: 5px; font-size: 12px; cursor: pointer; }
        .btn-delete { background: #ef4444; color: white; padding: 6px 12px; border: none; border-radius: 5px; font-size: 12px; cursor: pointer; }

        /* Flex Columns */
        .col-left { flex: 1; min-width: 300px; }
        .col-right { flex: 1.5; min-width: 320px; }
    </style>
</head>
<body>

    <!-- Login Section -->
    <div id="login-section" style="max-width: 400px; margin: 100px auto;" class="card">
        <h2 class="section-header" style="text-align: center; border: none;">Admin Login</h2>
        <div class="form-group">
            <label class="input-label">Email Address</label>
            <input type="email" id="email" placeholder="admin@example.com">
        </div>
        <div class="form-group">
            <label class="input-label">Password</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>
        <button id="login-btn" class="btn-primary btn-blue">Login</button>
        <p id="login-error" style="color: #ef4444; text-align: center; margin-top: 15px; font-size: 14px; font-weight: 500;"></p>
    </div>

    <!-- Admin Dashboard -->
    <div id="admin-section" style="display: none;">
        <nav class="admin-nav">
            <h1>Farming Base Layout - Admin</h1>
            <button id="logout-btn">Log Out</button>
        </nav>

        <div class="dashboard-container">
            <!-- Tabs -->
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('bases')">Manage Bases</button>
                <button class="tab-btn" onclick="switchTab('rules')">Manage Rules Page</button>
            </div>

            <!-- TAB 1: Manage Bases -->
            <div id="tab-bases" class="tab-content active">
                <div class="card col-left">
                    <h2 class="section-header" id="form-title">Add New Base</h2>
                    <input type="hidden" id="edit-base-id"> 
                    
                    <div class="form-group">
                        <label class="input-label">Town Hall Level</label>
                        <select id="base-th">
                            <option value="" disabled selected>Select TH...</option>
                            <option value="8">TH 8</option><option value="9">TH 9</option>
                            <option value="10">TH 10</option><option value="11">TH 11</option>
                            <option value="12">TH 12</option><option value="13">TH 13</option>
                            <option value="14">TH 14</option><option value="15">TH 15</option>
                            <option value="16">TH 16</option><option value="17">TH 17</option>
                            <option value="18">TH 18</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="input-label">Base Name / Title (e.g., Best TH14 Farming)</label>
                        <input type="text" id="base-title" placeholder="Enter base title">
                    </div>

                    <div class="form-group">
                        <label class="input-label">Image URL (Discord / Imgur link)</label>
                        <input type="url" id="base-img" placeholder="https://...">
                    </div>

                    <div class="form-group">
                        <label class="input-label">In-Game Copy Link</label>
                        <input type="url" id="base-link" placeholder="https://link.clashofclans.com/...">
                    </div>

                    <button id="submit-base-btn" class="btn-primary btn-success">Save Base Data</button>
                    <button id="cancel-edit-btn" class="btn-primary btn-gray">Cancel Editing</button>
                    <p id="base-msg" style="color: #10b981; font-weight: 600; text-align: center; margin-top: 15px; font-size: 14px;"></p>
                </div>

                <div class="card col-right">
                    <h2 class="section-header">Live Bases List (<span id="total-bases">0</span>)</h2>
                    <div id="bases-list">
                        <p style="text-align: center; color: #94a3b8; font-size: 14px;">Loading bases...</p>
                    </div>
                </div>
            </div>

            <!-- TAB 2: Manage Rules -->
            <div id="tab-rules" class="tab-content card">
                <div style="width: 100%;">
                    <h2 class="section-header">Edit Layout Rules</h2>
                    <p style="font-size: 13px; color: #64748b; margin-bottom: 15px;">Enter the rules and guidelines below. You can use simple text. This will be shown on the Rules page.</p>
                    
                    <div class="form-group">
                        <label class="input-label">Rules Content (Use enter for new lines)</label>
                        <textarea id="rules-content" placeholder="1. Rule one...&#10;2. Rule two..."></textarea>
                    </div>
                    
                    <button id="save-rules-btn" class="btn-primary btn-blue" style="max-width: 250px;">Update Rules Page</button>
                    <p id="rules-msg" style="color: #10b981; font-weight: 600; margin-top: 15px; font-size: 14px;"></p>
                </div>
            </div>

        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
      import { getFirestore, collection, addDoc, getDocs, doc, deleteDoc, updateDoc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
      import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

      const firebaseConfig = {
        apiKey: "AIzaSyC4hVhFlEBrdW7hF2EdLLTp6RiEaN-xxIA",
        authDomain: "lazy-cwl-directory.firebaseapp.com",
        projectId: "lazy-cwl-directory",
        storageBucket: "lazy-cwl-directory.firebasestorage.app",
        messagingSenderId: "587882023145",
        appId: "1:587882023145:web:ee8ac1f673e7b0e3e98878"
      };

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);
      const auth = getAuth(app);
      let allBasesData = {}; 

      // Auth
      onAuthStateChanged(auth, (user) => {
        document.getElementById('login-section').style.display = user ? 'none' : 'block';
        document.getElementById('admin-section').style.display = user ? 'block' : 'none';
        if(user) { fetchBases(); fetchRules(); }
      });

      document.getElementById('login-btn').addEventListener('click', () => {
        signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value)
            .catch(() => document.getElementById('login-error').innerText = "Access Denied: Invalid Credentials!");
      });
      document.getElementById('logout-btn').addEventListener('click', () => signOut(auth));

      // Tab Switching Logic
      window.switchTab = function(tabId) {
          document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
          document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
          document.getElementById('tab-' + tabId).classList.add('active');
          event.target.classList.add('active');
      };

      // FETCH BASES
      async function fetchBases() {
          const listContainer = document.getElementById('bases-list');
          allBasesData = {};
          try {
              const querySnapshot = await getDocs(collection(db, "farming_bases"));
              listContainer.innerHTML = '';
              document.getElementById('total-bases').innerText = querySnapshot.size;
              
              if(querySnapshot.empty) {
                  listContainer.innerHTML = '<p style="text-align:center; color:#94a3b8;">No bases added yet.</p>';
                  return;
              }

              querySnapshot.forEach((docSnap) => {
                  const base = docSnap.data();
                  const baseId = docSnap.id;
                  allBasesData[baseId] = base; 

                  const div = document.createElement('div');
                  div.className = 'list-item';
                  div.innerHTML = `
                      <div class="item-info">
                          <img src="${base.imgUrl || 'https://via.placeholder.com/60'}" class="item-img" alt="Base">
                          <div class="item-details">
                              <h4>TH ${base.th}: ${base.title}</h4>
                              <p><a href="${base.link}" target="_blank" style="color:#3b82f6; text-decoration:none;">View Link</a></p>
                          </div>
                      </div>
                      <div class="action-btns">
                          <button class="btn-edit" data-id="${baseId}">Edit</button>
                          <button class="btn-delete" data-id="${baseId}">Delete</button>
                      </div>
                  `;
                  listContainer.appendChild(div);
              });
              attachBaseActions();
          } catch (e) { console.error(e); }
      }

      function attachBaseActions() {
          document.querySelectorAll('.btn-edit').forEach(btn => {
              btn.addEventListener('click', (e) => {
                  const id = e.target.getAttribute('data-id');
                  const base = allBasesData[id];
                  
                  document.getElementById('form-title').innerText = "Update Base";
                  document.getElementById('submit-base-btn').innerText = "Update Data";
                  document.getElementById('cancel-edit-btn').style.display = "block";
                  document.getElementById('edit-base-id').value = id;
                  
                  document.getElementById('base-th').value = base.th;
                  document.getElementById('base-title').value = base.title;
                  document.getElementById('base-img').value = base.imgUrl;
                  document.getElementById('base-link').value = base.link;
              });
          });

          document.querySelectorAll('.btn-delete').forEach(btn => {
              btn.addEventListener('click', async (e) => {
                  if(confirm("Are you sure you want to delete this base layout?")) {
                      await deleteDoc(doc(db, "farming_bases", e.target.getAttribute('data-id')));
                      fetchBases();
                  }
              });
          });
      }

      // ADD / UPDATE BASE
      document.getElementById('submit-base-btn').addEventListener('click', async () => {
          const th = document.getElementById('base-th').value;
          const title = document.getElementById('base-title').value;
          const imgUrl = document.getElementById('base-img').value;
          const link = document.getElementById('base-link').value;
          const editId = document.getElementById('edit-base-id').value;
          
          if(!th || !title || !link) { alert("Please fill up TH level, Title, and Base Link!"); return; }

          const baseData = { th: parseInt(th), title, imgUrl, link };

          try {
              document.getElementById('submit-base-btn').innerText = "Saving...";
              if(editId) {
                  await updateDoc(doc(db, "farming_bases", editId), baseData);
                  document.getElementById('base-msg').innerText = "Base updated successfully!";
              } else {
                  await addDoc(collection(db, "farming_bases"), baseData);
                  document.getElementById('base-msg').innerText = "New base added!";
              }
              resetBaseForm();
              fetchBases();
          } catch (e) { console.error(e); }
      });

      function resetBaseForm() {
          document.getElementById('edit-base-id').value = '';
          document.getElementById('form-title').innerText = "Add New Base";
          document.getElementById('submit-base-btn').innerText = "Save Base Data";
          document.getElementById('cancel-edit-btn').style.display = "none";
          document.getElementById('base-th').value = ''; document.getElementById('base-title').value = '';
          document.getElementById('base-img').value = ''; document.getElementById('base-link').value = '';
          setTimeout(() => document.getElementById('base-msg').innerText = '', 3000);
      }
      document.getElementById('cancel-edit-btn').addEventListener('click', resetBaseForm);

      // -------------------------------------
      // RULES PAGE LOGIC
      // -------------------------------------
      async function fetchRules() {
          try {
              const docSnap = await getDoc(doc(db, "settings", "farming_rules"));
              if (docSnap.exists()) {
                  document.getElementById('rules-content').value = docSnap.data().content || "";
              }
          } catch (e) { console.error(e); }
      }

      document.getElementById('save-rules-btn').addEventListener('click', async () => {
          const content = document.getElementById('rules-content').value;
          document.getElementById('save-rules-btn').innerText = "Saving...";
          try {
              await setDoc(doc(db, "settings", "farming_rules"), { content: content });
              document.getElementById('save-rules-btn').innerText = "Update Rules Page";
              document.getElementById('rules-msg').innerText = "Rules updated successfully! This will show on the live page.";
              setTimeout(() => document.getElementById('rules-msg').innerText = '', 3000);
          } catch(e) { console.error(e); }
      });
    </script>
</body>
</html>
