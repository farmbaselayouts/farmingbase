<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farm Base Layouts - FWCB</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="brand-container">
            <img src="logo.png" alt="FWCB Logo" class="site-logo" onerror="this.style.display='none'"> 
            <h2 style="color: #3b82f6; margin: 0; font-size: 1.2rem;">Farming War Community of Bangladesh</h2>
        </div>
        
        <div class="menu-toggle" id="mobile-menu">☰</div>
        
        <div class="nav-links" id="nav-links">
            <div class="dropdown">
                <div class="dropbtn">Base Layouts and Rules ▼</div>
                <div class="dropdown-content">
                    <a href="#bases-section" class="nav-item">Base Layouts</a>
                    <a href="#rules-section" class="nav-item">Rules</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container">
        
        <section id="bases-section" class="content-section">
            <h1 class="page-title">Farm Base Layouts</h1>
            <div id="bases-container">
                <p style="text-align: center; color: #888;">Loading bases...</p>
            </div>
        </section>

        <hr style="border: 1px solid #2d2e37; margin: 60px 0;">

        <section id="rules-section" class="content-section">
            <h1 class="page-title">Base Layout Rules</h1>
            <div id="rules-display-container">
                <p style="text-align: center; color: #888;">Loading rules...</p>
            </div>
        </section>

    </div>

    <footer class="footer">
        <p>Copyright © 2026 FWCB - All Rights Reserved</p>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC4hVhFlEBrdW7hF2EdLLTp6RiEaN-xxIA",
            authDomain: "lazy-cwl-directory.firebaseapp.com",
            projectId: "lazy-cwl-directory",
            storageBucket: "lazy-cwl-directory.firebasestorage.app",
            messagingSenderId: "587882023145",
            appId: "1:587882023145:web:ee8ac1f673e7b0e3e98878"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Mobile Menu Logic
        const mobileMenuBtn = document.getElementById('mobile-menu');
        const navLinks = document.getElementById('nav-links');
        
        mobileMenuBtn.addEventListener('click', () => {
            navLinks.classList.toggle('active');
            mobileMenuBtn.innerHTML = navLinks.classList.contains('active') ? '✖' : '☰';
        });

        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', () => {
                navLinks.classList.remove('active');
                mobileMenuBtn.innerHTML = '☰';
            });
        });

        // Load Bases Function
        async function loadBases() {
            const container = document.getElementById('bases-container');
            try {
                const querySnapshot = await getDocs(collection(db, "farming_bases"));
                container.innerHTML = '';
                const bases = [];
                querySnapshot.forEach(doc => bases.push(doc.data()));

                const groups = {};
                bases.forEach(b => {
                    if (!groups[b.th]) groups[b.th] = [];
                    groups[b.th].push(b);
                });

                const sortedLevels = Object.keys(groups).sort((a, b) => b - a);
                if(sortedLevels.length === 0) container.innerHTML = '<p style="text-align: center; color: #888;">No bases found.</p>';

                sortedLevels.forEach(th => {
                    const section = document.createElement('div');
                    section.innerHTML = `<h2 class="th-section-title">Town Hall ${th}</h2>`;
                    const grid = document.createElement('div');
                    grid.className = 'base-grid';
                    groups[th].forEach(base => {
                        grid.innerHTML += `
                            <div class="base-card">
                                <img src="${base.imgUrl}" class="base-img" alt="Base">
                                <div class="base-info">
                                    <span class="base-name">${base.title}</span>
                                    <a href="${base.link}" target="_blank" class="copy-btn">Copy Base Link</a>
                                </div>
                            </div>
                        `;
                    });
                    section.appendChild(grid);
                    container.appendChild(section);
                });
            } catch (e) { console.error(e); }
        }

        // Load Rules Function
        async function loadRules() {
            const container = document.getElementById('rules-display-container');
            try {
                const querySnapshot = await getDocs(collection(db, "rule_sections"));
                container.innerHTML = '';
                let sections = [];
                querySnapshot.forEach(doc => sections.push({id: doc.id, ...doc.data()}));
                sections.sort((a, b) => a.timestamp - b.timestamp);

                if(sections.length === 0) container.innerHTML = '<p style="text-align: center; color: #888;">No rules found.</p>';

                sections.forEach(sec => {
                    let pointsHtml = '';
                    if(sec.points) sec.points.forEach(p => pointsHtml += `<li>${p}</li>`);
                    
                    let imgsHtml = '';
                    if(sec.images) sec.images.forEach(img => imgsHtml += `<img src="${img}" alt="Rule Image">`);

                    const div = document.createElement('div');
                    div.className = 'rule-section-container';
                    div.innerHTML = `
                        <h2 class="rule-section-title">${sec.title}</h2>
                        ${pointsHtml ? `<ul class="rule-points-list">${pointsHtml}</ul>` : ''}
                        ${imgsHtml ? `<div class="rule-gallery">${imgsHtml}</div>` : ''}
                    `;
                    container.appendChild(div);
                });
            } catch (e) { console.error(e); }
        }

        loadBases();
        loadRules();
    </script>
</body>
</html>
